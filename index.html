<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel de Desempenho — 8º e 9º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --surface2: #f0ede6;
    --ink: #1a1814; --ink2: #6b6860; --ink3: #a09d98; --border: #e0ddd6;
    --alto: #2d6a4f; --alto-bg: #d8f3dc;
    --medio: #1a5276; --medio-bg: #d6eaf8;
    --baixo: #7d6608; --baixo-bg: #fef9e7;
    --muitobaixo: #922b21; --muitobaixo-bg: #fdedec;
    --accent8: #c1440e; --accent9: #1a5276;
    --r: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); line-height: 1.4; }

  /* Navegação Fixa */
  nav { 
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem; position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
  }
  .nav-brand { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.02em; }
  .nav-tabs { display: flex; gap: 0.5rem; }
  .year-btn { 
    padding: 0.5rem 1rem; border: 1px solid var(--border); background: var(--surface);
    border-radius: var(--r); cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: 0.2s;
  }
  .active-8 { border-color: var(--accent8); color: var(--accent8); background: #fff5f0; }
  .active-9 { border-color: var(--accent9); color: var(--accent9); background: #f0f7ff; }
  .active-c { border-color: var(--ink); background: var(--ink); color: #fff; }

  /* Container Principal */
  main { padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .turma-section { display: none; }
  .turma-section.active { display: block; animation: fadeIn 0.4s ease; }

  /* Cards e Gráficos */
  .grid-header { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; border-radius: var(--r); }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 1.8rem; font-weight: 500; margin-top: 0.5rem; }

  /* Ranking e Barras */
  .ranking-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .rank-item { display: flex; align-items: center; gap: 1rem; background: var(--surface); padding: 0.75rem; border-radius: var(--r); border: 1px solid var(--border); }
  .rank-name { flex: 1; font-weight: 500; font-size: 0.9rem; }
  .bar-container { flex: 2; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; transition: width 1s ease; }

  /* Heatmap */
  .heatmap { overflow-x: auto; margin-top: 1.5rem; background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { border: 1px solid var(--border); padding: 0.6rem; text-align: center; }
  th { background: var(--surface2); font-weight: 600; color: var(--ink2); }
  .cell-dot { width: 12px; height: 12px; border-radius: 50%; margin: 0 auto; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media print {
    nav { display: none; }
    main { padding: 0; }
    .stat-card, .heatmap { border: 1px solid #000; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Gestão Escolar · Raquel Aguiar</div>
  <div class="nav-tabs">
    <button class="year-btn active-8" onclick="switchYear('8')">8º Ano</button>
    <button class="year-btn" onclick="switchYear('9')">9º Ano</button>
    <button class="year-btn" onclick="switchYear('C')">Comparativo</button>
  </div>
</nav>

<main>
  <section id="turma8" class="turma-section active">
    <div class="grid-header" id="stats8">
      </div>
    <div class="heatmap" id="map8"></div>
  </section>

  <section id="turma9" class="turma-section">
    <div class="grid-header" id="stats9"></div>
    <div class="heatmap" id="map9"></div>
  </section>

  <section id="turmaC" class="turma-section">
    <div class="stat-card">
      <h3>Diferença de Desempenho</h3>
      <div id="compare-canvas"></div>
    </div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
  // CONFIGURAÇÃO DO FIREBASE
  // Substitua pelos seus dados reais para garantir a sincronização
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "SEU_PROJETO.firebaseapp.com",
    projectId: "SEU_PROJETO_ID",
    storageBucket: "SEU_PROJETO.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // FUNÇÕES DE NAVEGAÇÃO
  function switchYear(year){
    document.querySelectorAll('.turma-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.year-btn').forEach(b => {
        b.className = 'year-btn';
    });
    
    const target = (year === 'C') ? 'turmaC' : 'turma' + year;
    document.getElementById(target).classList.add('active');
    
    // Atualiza estilo dos botões
    const btns = document.querySelectorAll('.year-btn');
    if(year === '8') btns[0].classList.add('active-8');
    else if(year === '9') btns[1].classList.add('active-9');
    else btns[2].classList.add('active-c');
  }

  // LÓGICA DE CARREGAMENTO (Exemplo)
  async function loadData() {
    // Aqui entra a sua lógica de buscar alunos no Firestore
    // e renderizar o Ranking e o Heatmap como você já faz
    console.log("Conectado ao Firebase. Carregando dados de Porto Franco...");
  }

  window.onload = loadData;
</script>
</body>
</html>
